<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Amplifier{% endblock %}</title>
  <!-- Tailwind CDN (preflight disabled so it doesn't reset browser defaults aggressively) -->
  <!-- Pattern: define window.tailwind.config BEFORE Tailwind script loads. Tailwind reads it on init. -->
  <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = { corePlugins: { preflight: false } };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
  <!-- Alpine helpers MUST load before Alpine itself (registers components before init) -->
  <script src="/static/js/alpine-helpers.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <!-- HTMX defaults (toast on errors, loading class) -->
  <script src="/static/js/htmx-defaults.js" defer></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; }
    a { color: #60a5fa; text-decoration: none; }
    a:hover { color: #93bbfd; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<!-- Alpine traverses children from this wrapper -->
<div x-data class="min-h-screen">
  <!-- Slim top bar -->
  <header class="bg-slate-900 border-b border-slate-700 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="text-white font-bold text-base tracking-tight">Amplifier</span>
      <span class="text-slate-500 text-sm">Local App</span>
    </div>
    <nav class="flex items-center gap-4 text-sm">
      <a href="/drafts" class="text-slate-300 hover:text-white">Review Drafts</a>
      <a href="/connect" class="text-slate-300 hover:text-white">Connect</a>
      <a href="/keys" class="text-slate-300 hover:text-white">API Keys</a>
    </nav>
  </header>

  <main class="max-w-4xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
