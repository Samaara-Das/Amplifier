name: Release

on:
  push:
    tags: ['v*.*.*']

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install -r requirements-build.txt
          python -m patchright install chromium

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          python scripts/build/build_windows.py
          choco install innosetup -y
          powershell scripts/build/build_windows_installer.ps1

      - name: Build (Mac)
        if: matrix.os == 'macos-latest'
        run: |
          python scripts/build/build_mac.py
          chmod +x scripts/build/build_mac_installer.sh
          scripts/build/build_mac_installer.sh

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/installers/AmplifierSetup-*.exe
            dist/installers/Amplifier-*.pkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
