<li style="position:static;padding:0;list-style:none;">
    <template x-teleport="body">
    <div
        x-data="commandPalette"
        x-init="items = [
            {label: 'Overview', href: '/admin/'},
            {label: 'Users', href: '/admin/users'},
            {label: 'Companies', href: '/admin/companies'},
            {label: 'Campaigns', href: '/admin/campaigns'},
            {label: 'Financial', href: '/admin/financial'},
            {label: 'Fraud & Trust', href: '/admin/fraud'},
            {label: 'Analytics', href: '/admin/analytics'},
            {label: 'Review Queue', href: '/admin/review-queue'},
            {label: 'Audit Log', href: '/admin/audit-log'},
            {label: 'Settings', href: '/admin/settings'},
            {label: 'Run Billing Now', action: function() { fetch('/admin/financial/run-billing', {method:'POST', headers:{'X-CSRFToken': (document.cookie.match(/csrf_token=([^;]+)/)||[])[1]||''}}).then(function(r){ window.location.href='/admin/financial'; }); }},
            {label: 'Run Payout Processing', action: function() { fetch('/admin/financial/run-payout-processing', {method:'POST', headers:{'X-CSRFToken': (document.cookie.match(/csrf_token=([^;]+)/)||[])[1]||''}}).then(function(r){ window.location.href='/admin/financial'; }); }},
            {label: 'Run Earning Promotion', action: function() { fetch('/admin/financial/run-earning-promotion', {method:'POST', headers:{'X-CSRFToken': (document.cookie.match(/csrf_token=([^;]+)/)||[])[1]||''}}).then(function(r){ window.location.href='/admin/financial'; }); }},
            {label: 'View Audit Log', href: '/admin/audit-log'}
        ]; filter();"
    >
        <!-- Command Palette Overlay -->
        <div
            x-show="open"
            x-cloak
            @keydown.escape.window="close()"
            style="position:fixed;inset:0;z-index:9000;display:flex;align-items:flex-start;justify-content:center;padding-top:80px;background:rgba(0,0,0,0.75);"
            @click.self="close()"
        >
            <div style="background:#1e293b;border:1px solid #334155;border-radius:12px;width:520px;max-width:90vw;box-shadow:0 25px 50px rgba(0,0,0,0.6);">
                <div style="padding:12px 16px;border-bottom:1px solid #334155;">
                    <input
                        x-model="query"
                        @input="filter()"
                        @keydown.enter.prevent="filtered.length > 0 && execute(filtered[0])"
                        @keydown.escape.prevent="close()"
                        placeholder="Search commands…"
                        style="width:100%;background:transparent;border:none;outline:none;color:#f8fafc;font-size:15px;font-family:inherit;"
                    >
                </div>
                <ul style="list-style:none;max-height:320px;overflow-y:auto;padding:6px 0;">
                    <template x-for="item in filtered" :key="item.label">
                        <li
                            @click="execute(item)"
                            style="padding:10px 16px;cursor:pointer;font-size:14px;color:#e2e8f0;border-radius:6px;margin:2px 6px;transition:background 0.1s;"
                            @mouseenter="$el.style.background='#2563eb20'"
                            @mouseleave="$el.style.background=''"
                            x-text="item.label"
                        ></li>
                    </template>
                    <template x-if="filtered.length === 0">
                        <li style="padding:16px;color:#64748b;text-align:center;font-size:13px;">No commands match "{{ query }}"</li>
                    </template>
                </ul>
                <div style="padding:8px 16px;border-top:1px solid #334155;font-size:11px;color:#475569;display:flex;gap:12px;">
                    <span>↵ Execute</span>
                    <span>Esc Close</span>
                    <span>Ctrl/Cmd+K Toggle</span>
                </div>
            </div>
        </div>
    </div>
    </template>
</li>
