<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — Amplifier</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: radial-gradient(ellipse at top, #1e3a5f 0%, #0f172a 50%); color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-container { width: 100%; max-width: 420px; padding: 20px; }
        .auth-card { background: #1e293b; border-radius: 12px; padding: 32px; border: 1px solid #334155; box-shadow: 0 0 80px rgba(37, 99, 235, 0.06); }
        .auth-header { text-align: center; margin-bottom: 28px; }
        .auth-header h1 { font-size: 22px; color: #f8fafc; margin-bottom: 6px; }
        .auth-header p { font-size: 14px; color: #64748b; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; font-weight: 500; }
        .form-control { width: 100%; padding: 10px 14px; background: #0f172a; color: #e2e8f0; border: 1px solid #334155; border-radius: 8px; font-size: 14px; font-family: inherit; transition: border-color 0.15s, box-shadow 0.15s; }
        .form-control:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        .btn { width: 100%; padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.15s; }
        .btn:hover { transform: translateY(-1px); }
        .btn-primary { background: #2563eb; color: #fff; }
        .btn-primary:hover { background: #1d4ed8; box-shadow: 0 4px 16px rgba(37, 99, 235, 0.35); }
        .btn-secondary { background: #334155; color: #e2e8f0; }
        .alert { padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
        .alert-error { background: #7f1d1d; color: #fca5a5; border: 1px solid #991b1b; }
        .tabs { display: flex; margin-bottom: 24px; border-bottom: 1px solid #334155; }
        .tab { flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: 500; color: #64748b; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; background: none; border-top: none; border-left: none; border-right: none; }
        .tab:hover { color: #94a3b8; }
        .tab.active { color: #60a5fa; border-bottom-color: #3b82f6; }
        .form-panel { display: none; }
        .form-panel.active { display: block; }
        .form-footer { text-align: center; margin-top: 20px; font-size: 13px; color: #64748b; }
        .form-footer a { color: #60a5fa; text-decoration: none; }
        .form-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Amplifier for Business</h1>
                <p>Company Dashboard</p>
            </div>

            {% if error %}
            <div class="alert alert-error">{{ error }}</div>
            {% endif %}

            <div class="tabs">
                <button class="tab {% if not show_register %}active{% endif %}" onclick="switchTab('login')">Sign In</button>
                <button class="tab {% if show_register %}active{% endif %}" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <div id="login-panel" class="form-panel {% if not show_register %}active{% endif %}">
                <form method="post" action="/company/login">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" name="email" class="form-control" placeholder="company@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" name="password" class="form-control" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Sign In</button>
                </form>
            </div>

            <!-- Register Form -->
            <div id="register-panel" class="form-panel {% if show_register %}active{% endif %}">
                <form method="post" action="/company/register">
                    <div class="form-group">
                        <label for="reg-name">Company Name</label>
                        <input type="text" id="reg-name" name="name" class="form-control" placeholder="Acme Corp" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" name="email" class="form-control" placeholder="company@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" name="password" class="form-control" placeholder="Choose a password" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary">Create Account</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('login-panel').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('register-panel').classList.add('active');
            }
        }
    </script>
</body>
</html>
